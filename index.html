<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sora動画プロンプト構築ツール Ver1.1</title>
  <style>
    :root {
      --bg: #061226;
      --panel: #0c1b34;
      --panel-2: #112548;
      --border: #28436e;
      --text: #eef4ff;
      --muted: #9fb2d4;
      --accent: #33d1ff;
      --accent-2: #43f1b5;
      --warning: #ffd166;
      --chip: #14294d;
      --selected: #193562;
      --shadow: 0 10px 30px rgba(0,0,0,.28);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
      background: linear-gradient(180deg, #03101f 0%, #07162d 100%);
      color: var(--text);
    }

    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 28px 20px 40px;
    }

    .hero h1 {
      margin: 0 0 8px;
      font-size: 2.2rem;
      line-height: 1.2;
    }

    .hero p {
      margin: 0 0 22px;
      color: var(--muted);
      line-height: 1.7;
    }

    .layout {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 18px;
      align-items: start;
    }

    .sidebar, .main {
      background: rgba(12, 27, 52, 0.92);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .sidebar {
      position: sticky;
      top: 16px;
      padding: 18px;
    }

    .main {
      padding: 22px;
      min-height: 720px;
    }

    .side-title {
      font-size: .92rem;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .progress-text {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .progress-bar {
      width: 100%;
      height: 10px;
      background: #0a1730;
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid var(--border);
      margin-bottom: 16px;
    }

    .progress-fill {
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      transition: width .25s ease;
    }

    .step-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 16px;
    }

    .step-item {
      background: #09162e;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 10px 12px;
    }

    .step-item.active {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px rgba(51,209,255,.18) inset;
      background: #0d2242;
    }

    .step-item.done {
      background: #0a1f3d;
    }

    .step-name {
      font-weight: 700;
      font-size: .98rem;
      margin-bottom: 4px;
    }

    .step-summary {
      color: var(--text);
      font-size: .9rem;
      line-height: 1.4;
    }

    .step-reason {
      margin-top: 4px;
      color: var(--muted);
      font-size: .8rem;
      line-height: 1.35;
    }

    .save-box {
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: .88rem;
      line-height: 1.7;
    }

    .step-badge {
      display: inline-block;
      padding: 5px 10px;
      border-radius: 999px;
      background: #12284c;
      border: 1px solid var(--border);
      color: var(--accent);
      font-weight: 700;
      font-size: .85rem;
      margin-bottom: 12px;
    }

    .question {
      font-size: 2rem;
      line-height: 1.25;
      margin: 0 0 12px;
    }

    .desc {
      color: var(--muted);
      line-height: 1.7;
      margin: 0 0 18px;
    }

    .option-grid {
      display: grid;
      gap: 12px;
    }

    .option-card, .mini-card {
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      background: #09162e;
      cursor: pointer;
      transition: transform .12s ease, border-color .12s ease, background .12s ease;
    }

    .option-card:hover, .mini-card:hover {
      transform: translateY(-1px);
      border-color: var(--accent);
      background: #0d2140;
    }

    .option-card.selected, .mini-card.selected {
      background: var(--selected);
      border-color: var(--accent-2);
      box-shadow: 0 0 0 1px rgba(67,241,181,.18) inset;
    }

    .option-title {
      font-size: 1.2rem;
      font-weight: 800;
      margin-bottom: 6px;
    }

    .option-desc {
      color: var(--muted);
      line-height: 1.6;
      white-space: pre-line;
    }

    .option-reason-box, .recommend-box, .review-box, .summary-card {
      margin-top: 16px;
      padding: 16px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: #0a1933;
    }

    .option-reason-box h3, .recommend-box h3, .review-box h3, .summary-card h3 {
      margin: 0 0 10px;
      font-size: 1.1rem;
    }

    ul.reason-list, .summary-reasons {
      margin: 8px 0 0 18px;
      padding: 0;
      color: var(--muted);
      line-height: 1.7;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    .btn-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      appearance: none;
      border: 1px solid var(--border);
      background: #0a1730;
      color: var(--text);
      border-radius: 14px;
      padding: 12px 18px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: .15s ease;
    }

    button:hover { transform: translateY(-1px); }
    button.primary {
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      color: #03101f;
      border: none;
    }
    button.secondary {
      background: #0c1c38;
    }
    button.ghost {
      background: transparent;
    }
    button.warning {
      background: linear-gradient(90deg, #ffd166, #ffb703);
      color: #1d1500;
      border: none;
    }

    .choice-note {
      color: var(--warning);
      font-size: .92rem;
      line-height: 1.6;
    }

    .mini-grid {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
    }

    .hidden { display: none !important; }

    .textarea, .input, select {
      width: 100%;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: #08142a;
      color: var(--text);
      padding: 14px 16px;
      font-size: 1rem;
      line-height: 1.6;
    }

    .textarea { min-height: 160px; resize: vertical; }

    .field {
      margin-bottom: 14px;
    }

    .field label {
      display: block;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .hint {
      color: var(--muted);
      font-size: .9rem;
      line-height: 1.6;
      margin-top: 6px;
    }

    .dynamic-block {
      margin-bottom: 14px;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      background: #0a1831;
    }

    .tag-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .tag {
      padding: 9px 12px;
      border-radius: 999px;
      background: var(--chip);
      border: 1px solid var(--border);
      cursor: pointer;
      font-size: .92rem;
    }

    .tag.selected {
      background: #17345d;
      border-color: var(--accent);
    }

    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .summary-section {
      display: grid;
      gap: 12px;
    }

    .summary-item {
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px 16px;
      background: #0a1933;
    }

    .summary-item strong {
      display: block;
      font-size: 1rem;
      margin-bottom: 4px;
    }

    .summary-value {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .code-box {
      white-space: pre-wrap;
      background: #071427;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      line-height: 1.7;
      color: #eaf3ff;
    }

    .copy-tools {
      display: flex;
      gap: 10px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    @media (max-width: 980px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar { position: static; }
    }

    @media (max-width: 640px) {
      .wrap { padding: 18px 12px 28px; }
      .question { font-size: 1.5rem; }
      .main, .sidebar { padding: 16px; }
      .two-col { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <h1>Sora動画プロンプト構築ツール Ver1.1</h1>
      <p>選択式で動画の方向性を整理し、最後にサマリーとSora用プロンプトを生成します。途中の進捗では、選んだ内容と理由も確認できます。まずはテスト運用向けです。</p>
    </div>

        <div class="progress-text" id="progressText">Step 1 / 10</div>

        <div class="step-list" id="stepList"></div>
        <div class="save-box">
          <div class="side-title">保存方法</div>

          Ver1.1では「選択理由の見える化」と「迷ったらこれ」提案を追加しています。
        </div>
      </aside>

      <main class="main">
        <div id="stepContainer"></div>
      </main>
    </div>
  </div>

      '文章': ['見出しや日付を先に見せて主旨を伝えやすい'],
      '背景演出': ['雰囲気づくりから入りやすく、導入演出と相性が良い'],
      '静止画': ['最初から情報を見せたい時に向くが、読みやすさの確認が必要'],
      'その他': ['個別意図に合わせた構成が必要']
    };

    const state = {
      currentStep: 0,
      purpose: null,
      appeal: null,
      size: null,
      length: null,
      mood: null,
      material: null,
      flowMode: null,
      recommendedFlow: null,
      recommendedFlowReasons: [],
      customLevel: null,
      customFlowText: '',
      customMid: { start: null, middle: [], end: null, emphasis: null },
      customLight: { focus: null, impression: null, ending: null },
      textCount: 2,
      textBlocks: [],
      summaryReasons: {}
    };

    function getItem(dataset, value) {
      return dataset.find(x => x.value === value) || null;
    }

    function initializeTextBlocks() {
      if (!state.textBlocks.length) {
        state.textBlocks = [
          { text: '', tags: [] },
          { text: '', tags: [] }
        ];
      }
    }

    initializeTextBlocks();

    function renderSidebar() {
      const stepList = document.getElementById('stepList');
      const progressText = document.getElementById('progressText');
      const progressFill = document.getElementById('progressFill');
      progressText.textContent = `Step ${state.currentStep + 1} / ${stepMeta.length}`;
      progressFill.style.width = `${((state.currentStep + 1) / stepMeta.length) * 100}%`;

      stepList.innerHTML = stepMeta.map((step, index) => {
        const cls = index === state.currentStep ? 'step-item active' : index < state.currentStep ? 'step-item done' : 'step-item';
        const summary = getSidebarSummary(step.id);
        return `
          <div class="${cls}">
            <div class="step-name">${step.name}</div>
            ${summary ? `<div class="step-summary">${summary.label}</div><div class="step-reason">理由: ${summary.reason}</div>` : `<div class="step-reason">未選択</div>`}
          </div>
        `;
      }).join('');
    }

    function getSidebarSummary(stepId) {
      switch (stepId) {
        case 'purpose':
          return state.purpose ? makeSummaryFromItem(data.purpose, state.purpose) : null;
        case 'appeal':
          return state.appeal ? makeSummaryFromItem(data.appeal, state.appeal) : null;
        case 'size':
          return state.size ? makeSummaryFromItem(data.size, state.size) : null;
        case 'length':
          return state.length ? makeSummaryFromItem(data.length, state.length) : null;
        case 'mood':
          return state.mood ? makeSummaryFromItem(data.mood, state.mood) : null;
        case 'material':
          return state.material ? makeSummaryFromItem(data.material, state.material) : null;
        case 'flow':
          return getFlowSidebarSummary();
        case 'texts':
          return state.textBlocks.some(b => b.text.trim())
            ? { label: state.textBlocks.filter(b => b.text.trim()).map(b => b.text.trim()).slice(0,2).join(' / '), reason: '表示したい文章の順番を整理済み' }
            : null;
        case 'summary':
          return state.summaryReasons && Object.keys(state.summaryReasons).length ? { label: '選択内容を確認', reason: '理由つきでサマリー化済み' } : null;
        case 'output':
          return state.currentStep >= 9 ? { label: '出力可能', reason: 'プロンプトとレビュー文を生成済み' } : null;
        default:
          return null;
      }
    }

    function makeSummaryFromItem(dataset, value) {
      const item = getItem(dataset, value);
      if (!item) return null;
      return { label: item.label, reason: item.reasons?.[0] || '選択内容に応じて構成を調整' };
    }

    function getFlowSidebarSummary() {
      if (state.flowMode === 'recommended' && state.recommendedFlow) {
        return { label: state.recommendedFlow, reason: (state.recommendedFlowReasons[0] || 'おすすめ構成を選択') };
      }
      if (state.flowMode === 'auto' && state.recommendedFlow) {
        return { label: `自動提案: ${state.recommendedFlow}`, reason: (state.recommendedFlowReasons[0] || '現在の選択内容から提案') };
      }
      if (state.flowMode === 'custom' && state.customLevel) {
        const levelItem = getItem(data.customLevel, state.customLevel);
        return { label: `カスタム構成 (${levelItem?.label || ''})`, reason: levelItem?.reasons?.[0] || '自分の流れを元に構成' };
      }
      return null;
    }

    function cardHTML(dataset, selected, onClickFnName) {
      return dataset.map(item => `
        <div class="option-card ${selected === item.value ? 'selected' : ''}" onclick="${onClickFnName}('${escapeJS(item.value)}')">
          <div class="option-title">${item.label}</div>
          <div class="option-desc">${item.desc}</div>
        </div>
      `).join('');
    }

    function reasonBoxHTML(title, reasons) {
      if (!reasons || !reasons.length) return '';
      return `
        <div class="option-reason-box">
          <h3>${title}</h3>
          <ul class="reason-list">${reasons.map(r => `<li>${r}</li>`).join('')}</ul>
        </div>
      `;
    }

    function renderStep() {
      renderSidebar();
      const container = document.getElementById('stepContainer');
      const steps = [renderPurpose, renderAppeal, renderSize, renderLength, renderMood, renderMaterial, renderFlow, renderTexts, renderSummary, renderOutput];
      container.innerHTML = steps[state.currentStep]();
    }

    function baseWrap(title, desc, inner, options = {}) {
      const prevHidden = options.prevHidden ? 'hidden' : '';
      const nextHidden = options.nextHidden ? 'hidden' : '';
      const nextLabel = options.nextLabel || '次へ進む';
      const nextAction = options.nextAction || 'nextStep()';
      const extraLeft = options.extraLeft || '';
      const extraRight = options.extraRight || '';
      return `
        <div class="step-badge">Step ${state.currentStep + 1} / ${stepMeta.length}</div>
        <h2 class="question">${title}</h2>
        <p class="desc">${desc}</p>
        ${inner}
        <div class="toolbar">
          <div class="btn-row">
            <button class="secondary ${prevHidden}" onclick="prevStep()">前に戻る</button>
            ${extraLeft}
          </div>
          <div class="btn-row">
            ${extraRight}
            <button class="ghost" onclick="goTop()">最初から</button>
            <button class="primary ${nextHidden}" onclick="${nextAction}">${nextLabel}</button>
          </div>
        </div>
      `;
    }

    function renderPurpose() {
      const selectedItem = getItem(data.purpose, state.purpose);
      return baseWrap(
        'この動画は何に使いますか？',
        '用途によって、向いているサイズや長さ、見せ方が変わります。',
        `
          <div class="option-grid">${cardHTML(data.purpose, state.purpose, 'setPurpose')}</div>
          ${selectedItem ? reasonBoxHTML('この選択が向いている理由', selectedItem.reasons) : ''}
        `,
        { prevHidden: true, nextHidden: !state.purpose }
      );
    }

    function renderAppeal() {
      const selectedItem = getItem(data.appeal, state.appeal);
      return baseWrap(
        'この動画で一番伝えたいことは何ですか？',
        '動画の中心になる内容を選んでください。ここで選んだ内容をもとに、構成や演出の方向性が決まります。',
        `
          <div class="option-grid">${cardHTML(data.appeal, state.appeal, 'setAppeal')}</div>
          ${selectedItem ? reasonBoxHTML('この選択が向いている理由', selectedItem.reasons) : ''}
        `,
        { nextHidden: !state.appeal }
      );
    }

    function renderSize() {
      const selectedItem = getItem(data.size, state.size);
      return baseWrap(
        '動画サイズを選んでください',
        '使用する場所に合ったサイズを選んでください。サイズによって、見やすい構図や文字の置き方が変わります。',
        `
          <div class="option-grid">${cardHTML(data.size, state.size, 'setSize')}</div>
          ${selectedItem ? reasonBoxHTML('この選択が向いている理由', selectedItem.reasons) : ''}
        `,
        { nextHidden: !state.size }
      );
    }

    function renderLength() {
      const selectedItem = getItem(data.length, state.length);
      return baseWrap(
        '動画の長さを選んでください',
        '長さによって、入れられる情報量と向いている販促が変わります。',
        `
          <div class="option-grid">${cardHTML(data.length, state.length, 'setLength')}</div>
          ${selectedItem ? reasonBoxHTML('この長さが向いている理由', selectedItem.reasons) : ''}
        `,
        { nextHidden: !state.length }
      );
    }

    function renderMood() {
      const selectedItem = getItem(data.mood, state.mood);
      return baseWrap(
        '動画の雰囲気を選んでください',
        'どのような空気感で見せたいかを選んでください。迷った場合は、完成イメージに近いものを選んでください。',
        `
          <div class="option-grid">${cardHTML(data.mood, state.mood, 'setMood')}</div>
          ${selectedItem ? reasonBoxHTML('この雰囲気が向いている理由', selectedItem.reasons) : ''}
        `,
        { nextHidden: !state.mood }
      );
    }

    function renderMaterial() {
      const selectedItem = getItem(data.material, state.material);
      return baseWrap(
        '使う素材を選んでください',
        '動画内で使いたい素材があれば選んでください。選んだ内容に応じて、後半の入力内容が変わります。',
        `
          <div class="option-grid">${cardHTML(data.material, state.material, 'setMaterial')}</div>
          ${selectedItem ? reasonBoxHTML('この素材選択が向いている理由', selectedItem.reasons) : ''}
        `,
        { nextHidden: !state.material }
      );
    }

    function renderFlow() {
      const modeReason = state.flowMode === 'recommended' ? ['用意された構成から迷わず選べます', '初心者でも進めやすい流れです']
        : state.flowMode === 'custom' ? ['自分のイメージを活かして構成できます', '固まり具合に応じて入力方法を変えられます']
        : state.flowMode === 'auto' ? ['現在の選択内容に合わせて無理のない構成を提案します', 'なぜその構成なのかも確認しながら進められます']
        : null;

      let inner = `
        <div class="mini-grid">
          <div class="mini-card ${state.flowMode === 'recommended' ? 'selected' : ''}" onclick="setFlowMode('recommended')">
            <div class="option-title">おすすめ構成から選ぶ</div>
            <div class="option-desc">用意された流れから選ぶ方法です。迷わず進めたい方向けです。</div>
          </div>
          <div class="mini-card ${state.flowMode === 'custom' ? 'selected' : ''}" onclick="setFlowMode('custom')">
            <div class="option-title">カスタム構成で進める</div>
            <div class="option-desc">自分のイメージに合わせて流れを組み立てる方法です。</div>
          </div>
          <div class="mini-card ${state.flowMode === 'auto' ? 'selected' : ''}" onclick="autoRecommendFlow()">
            <div class="option-title">迷ったらこれ</div>
            <div class="option-desc">ここまでの選択内容から、おすすめ構成を自動で提案します。</div>
          </div>
        </div>
        ${modeReason ? reasonBoxHTML('この選び方の特徴', modeReason) : ''}
      `;

      if (state.flowMode === 'recommended') {
        const selectedItem = getItem(data.flowRecommended, state.recommendedFlow);
        inner += `
          <div class="recommend-box">
            <h3>おすすめの動画構成を選んでください</h3>
            <p class="desc">作りたい動画に近い流れを選んでください。選んだ構成をもとに、後で文章や演出を組み立てます。</p>
            <div class="option-grid">${cardHTML(data.flowRecommended, state.recommendedFlow, 'setRecommendedFlow')}</div>
            ${selectedItem ? reasonBoxHTML('この構成が向いている理由', selectedItem.reasons) : ''}
          </div>
        `;
      }

      if (state.flowMode === 'auto' && state.recommendedFlow) {
        inner += `
          <div class="recommend-box">
            <h3>この動画にはこの構成がおすすめです</h3>
            <div class="summary-value">${state.recommendedFlow}</div>
            <div class="desc">選んだ用途・長さ・素材に合わせて、伝わりやすく無理のない構成を選んでいます。</div>
            <ul class="reason-list">${state.recommendedFlowReasons.map(r => `<li>${r}</li>`).join('')}</ul>
            <div class="copy-tools">
              <button class="primary" onclick="acceptAutoFlow()">この構成で進む</button>
              <button class="secondary" onclick="state.flowMode='recommended'; renderStep();">自分で選び直す</button>
            </div>
          </div>
        `;
      }

      if (state.flowMode === 'custom') {
        const selectedLevel = getItem(data.customLevel, state.customLevel);
        inner += `
          <div class="recommend-box">
            <h3>動画の流れはどのくらい決まっていますか？</h3>
            <p class="desc">今のイメージに近いものを選んでください。選んだ内容に合わせて、入力方法や補助内容が変わります。</p>
            <div class="option-grid">${cardHTML(data.customLevel, state.customLevel, 'setCustomLevel')}</div>
            ${selectedLevel ? reasonBoxHTML('この入力方法が向いている理由', selectedLevel.reasons) : ''}
            ${renderCustomFlowFields()}
          </div>
        `;
      }

      return baseWrap(
        '動画の流れをどう決めますか？',
        '構成に迷う場合は、ここまでの選択内容からおすすめの流れを提案できます。選択内容と理由を見ながら進めてください。',
        inner,
        { nextHidden: !canProceedFlow() }
      );
    }

    function renderCustomFlowFields() {
      if (!state.customLevel) return '';
      if (state.customLevel === 'full') {
        return `
          <div class="field" style="margin-top:14px;">
            <label>考えている動画の流れを入力してください</label>
            <textarea class="textarea" placeholder="例：\n・最初に黒背景から光を入れる\n・次に『新装開店！』を大きく表示する\n・その後に『3月23日（月）』を表示する\n・最後に静止画POPを全面表示する" oninput="setCustomFlowText(this.value)">${escapeHTML(state.customFlowText)}</textarea>
            <div class="hint">頭の中で決まっている流れを、そのまま箇条書きで書いてください。細かい表現は後で整理されます。</div>
          </div>
        `;
      }
      if (state.customLevel === 'mid') {
        return `
          <div class="two-col" style="margin-top:14px;">
            <div class="field">
              <label>最初に何を見せたいですか？</label>
              <select onchange="setCustomMid('start', this.value)">
                ${optionTags(['', 'ロゴ', '文章', '背景演出', '静止画', 'その他'], state.customMid.start)}
              </select>
            </div>
            <div class="field">
              <label>最後に何で締めたいですか？</label>
              <select onchange="setCustomMid('end', this.value)">
                ${optionTags(['', '静止画で締める', 'ロゴで締める', '文章で締める', 'フェードアウトで終える', 'その他'], state.customMid.end)}
              </select>
            </div>
          </div>
          <div class="field">
            <label>途中で何を見せたいですか？（複数選択可）</label>
            <div class="tag-wrap">
              ${['文章を順番に見せる', '日付や時間を見せる', 'ロゴを入れる', '画像を入れる', '背景演出を続ける', 'その他'].map(v => `
                <div class="tag ${state.customMid.middle.includes(v) ? 'selected' : ''}" onclick="toggleCustomMidMiddle('${escapeJS(v)}')">${v}</div>
              `).join('')}
            </div>
          </div>
          <div class="field">
            <label>特に強く見せたいのはどこですか？</label>
            <select onchange="setCustomMid('emphasis', this.value)">
              ${optionTags(['', '最初', '真ん中', '最後'], state.customMid.emphasis)}
            </select>
          </div>
          <div class="hint">大まかな流れが決まっていれば十分です。細かい順番や演出は、このあと整理されます。</div>
        `;
      }
      if (state.customLevel === 'light') {
        return `
          <div class="two-col" style="margin-top:14px;">
            <div class="field">
              <label>この動画で一番目立たせたいものはどれですか？</label>
              <select onchange="setCustomLight('focus', this.value)">
                ${optionTags(['', '見出し', '日付', '時間', 'ロゴ', '画像', '雰囲気'], state.customLight.focus)}
              </select>
            </div>
            <div class="field">
              <label>動画の印象はどれに近づけたいですか？</label>
              <select onchange="setCustomLight('impression', this.value)">
                ${optionTags(['', 'インパクト重視', '分かりやすさ重視', '高級感重視', 'スピード感重視', '落ち着き重視'], state.customLight.impression)}
              </select>
            </div>
          </div>
          <div class="field">
            <label>最後はどの見せ方にしたいですか？</label>
            <select onchange="setCustomLight('ending', this.value)">
              ${optionTags(['', 'しっかり締めたい', '余韻を残したい', '情報を見せて終わりたい', '画像で止めたい'], state.customLight.ending)}
            </select>
          </div>
          <div class="hint">まだ流れが固まっていなくても大丈夫です。重視したいポイントから構成を組み立てます。</div>
        `;
      }
      return '';
    }

    function renderTexts() {
      return baseWrap(
        'この動画で順番に見せたい文章はいくつありますか？',
        '動画の中で動かしたい文章の数を選んでください。選んだ数に応じて入力欄が表示されます。もっとも目立たせたい文章を先に入れると整理しやすくなります。',
        `
          <div class="field">
            <label>文章数</label>
            <select onchange="setTextCount(this.value)">${optionTags(['1','2','3','4','5'], String(state.textCount))}</select>
          </div>
          <div id="textBlocks">${renderTextBlocks()}</div>
        `,
        { nextHidden: !canProceedTexts() }
      );
    }

    function renderTextBlocks() {
      adjustTextBlocks();
      return state.textBlocks.map((block, index) => `
        <div class="dynamic-block">
          <div class="field">
            <label>文章ブロック${index + 1}</label>
            <input class="input" value="${escapeHTML(block.text)}" placeholder="${textPlaceholder(index)}" oninput="setTextBlock(${index}, this.value)">
            <div class="hint">${textHint(index)}</div>
          </div>
          <div class="field">
            <label>見せ方（任意）</label>
            <div class="tag-wrap">
              ${tagOptions.map(tag => `
                <div class="tag ${block.tags.includes(tag) ? 'selected' : ''}" onclick="toggleTextTag(${index}, '${escapeJS(tag)}')">${tag}</div>
              `).join('')}
            </div>
          </div>
        </div>
      `).join('');
    }

    function renderSummary() {
      const summary = buildSummaryData();
      return baseWrap(
        '内容を確認してください',
        'ここまでに選んだ内容をもとに、作りたい動画の概要をまとめています。選んだ内容とその理由も確認できます。問題なければ、この内容をもとにSora用のプロンプトを作成します。',
        `
          <div class="summary-section">
            ${summary.map(item => `
              <div class="summary-item">
                <strong>${item.label}</strong>
                <div class="summary-value">${item.value}</div>
                <ul class="summary-reasons">${item.reasons.map(r => `<li>${r}</li>`).join('')}</ul>
              </div>
            `).join('')}
          </div>
        `,
        { nextLabel: 'プロンプトを作成する' }
      );
    }

    function renderOutput() {
      const prompt = generatePrompt();
      const review = generateReviewRequest(prompt);
      return baseWrap(
        'プロンプトが完成しました',
        '以下は、これまでの内容をもとに整理したSora用の文章です。そのままコピーして使用できます。合わせてGPT / Claude向けのレビュー依頼文も出力しています。',
        `
          <div class="summary-card">
            <h3>① 完成プロンプト</h3>
            <div class="code-box" id="promptBox">${escapeHTML(prompt)}</div>
            <div class="copy-tools">
              <button class="primary" onclick="copyText('promptBox')">完成プロンプトをコピー</button>
            </div>
          </div>
          <div class="review-box">
            <h3>レビュー依頼文（GPT / Claude用）</h3>
            <div class="code-box" id="reviewBox">${escapeHTML(review)}</div>
            <div class="copy-tools">
              <button class="secondary" onclick="copyText('reviewBox')">レビュー文をコピー</button>
            </div>
          </div>
        `,
        { nextHidden: true, extraRight: '<button class="secondary" onclick="prevStep()">内容を修正する</button>' }
      );
    }

    function buildSummaryData() {
      const purpose = getItem(data.purpose, state.purpose);
      const appeal = getItem(data.appeal, state.appeal);
      const size = getItem(data.size, state.size);
      const length = getItem(data.length, state.length);
      const mood = getItem(data.mood, state.mood);
      const material = getItem(data.material, state.material);
      const flow = getFlowSummary();
      const texts = state.textBlocks.filter(b => b.text.trim()).map((b, i) => `文章${i+1}:「${b.text.trim()}」${b.tags.length ? `（${b.tags.join(' / ')}）` : ''}`);

      const result = [
        { label: '用途', value: purpose?.label || '-', reasons: purpose?.reasons || ['用途に応じて見せ方を最適化'] },
        { label: '主な訴求内容', value: appeal?.label || '-', reasons: appeal?.reasons || ['主役になる内容を明確化'] },
        { label: '動画サイズ', value: size?.label || '-', reasons: size?.reasons || ['表示場所に合わせて見やすさを調整'] },
        { label: '動画の長さ', value: length?.label || '-', reasons: length?.reasons || ['尺に合わせて情報量を調整'] },
        { label: '雰囲気', value: mood?.label || '-', reasons: mood?.reasons || ['世界観と演出の方向性を固定'] },
        { label: '使用素材', value: material?.label || '-', reasons: material?.reasons || ['素材の使い方を自然に整理'] },
        { label: '動画構成', value: flow.value, reasons: flow.reasons },
        { label: '見せたい文章', value: texts.length ? texts.join(' / ') : '未入力', reasons: ['表示順を明確にし、映像化しやすく整理'] }
      ];

      state.summaryReasons = result.reduce((acc, item) => {
        acc[item.label] = item.reasons;
        return acc;
      }, {});
      return result;
    }

    function getFlowSummary() {
      if (state.flowMode === 'recommended' || state.flowMode === 'auto') {
        return { value: state.recommendedFlow || '未選択', reasons: state.recommendedFlowReasons.length ? state.recommendedFlowReasons : ['構成をまだ選択していません'] };
      }
      if (state.flowMode === 'custom') {
        if (state.customLevel === 'full') {
          return { value: 'カスタム構成（ほぼ全部決まっている）', reasons: ['頭の中の流れをそのまま反映するルート', '箇条書きベースで意図を崩さず整理しやすい'] };
        }
        if (state.customLevel === 'mid') {
          const reasons = ['最初・途中・最後を分けて考える構成'];
          if (state.customMid.start && flowReasonMap[state.customMid.start]) reasons.push(flowReasonMap[state.customMid.start][0]);
          if (state.customMid.emphasis) reasons.push(`「${state.customMid.emphasis}」を強く見せる流れに調整しやすい`);
          return { value: 'カスタム構成（あらかた決まっている）', reasons };
        }
        if (state.customLevel === 'light') {
          const reasons = ['重視ポイントから流れを組み立てる構成'];
          if (state.customLight.focus) reasons.push(`「${state.customLight.focus}」を主役にしやすい`);
          if (state.customLight.impression) reasons.push(`「${state.customLight.impression}」寄りの印象に調整しやすい`);
          return { value: 'カスタム構成（ぼんやり決まっている）', reasons };
        }
      }
      return { value: '未選択', reasons: ['構成が未選択です'] };
    }

    function generatePrompt() {
      const purpose = state.purpose || '未設定';
      const appeal = state.appeal || '未設定';
      const size = state.size || '未設定';
      const length = state.length || '未設定';
      const mood = state.mood || '未設定';
      const material = state.material || '未設定';
      const flow = getFlowSummary();
      const textLines = state.textBlocks
        .filter(b => b.text.trim())
        .map((b, i) => `・文章${i + 1}:「${b.text.trim()}」${b.tags.length ? `（${b.tags.join(' / ')}）` : ''}`)
        .join('\n');

      const customFlowText = buildCustomFlowText();
      const flowLine = state.flowMode === 'custom' ? customFlowText : flow.value;
      const creditBand = inferCreditBand();
      const scene = generateScenes();
      const camera = generateCameraNotes();
      const imageUsage = generateImageUsage();
      const customize = generateCustomizeIdeas();

      return `動画生成AI用プロンプト\n\n用途: ${purpose}\n主な訴求内容: ${appeal}\n動画サイズ: ${size}\n動画の長さ: ${length}\n雰囲気: ${mood}\n使用素材: ${material}\n動画構成: ${flowLine}\n想定クレジット帯: ${creditBand}\n\nこの動画は${purpose}向けで、${appeal}を中心に伝える構成にする。${size}で、${length}の尺に収める。全体の雰囲気は${mood}。素材は${material}を前提とする。\n\n見せたい文章は以下の順番で表示する。\n${textLines || '・文章未入力'}\n\n映像としては、冒頭で内容に合った導入を入れ、その後に訴求文章を順番に見せ、最後は内容がしっかり伝わる締め方にする。被写体、動き、カメラワーク、雰囲気、ライティング、背景、時間帯、スタイルが映像として自然につながるように整理する。静止画やロゴがある場合は不自然な加工を避け、動画として成立するように新規演出で補完する。必要に応じてズーム、パン、発光、フェード、粒子感、反射光などを使い、静止画感を減らして奥行きを出す。\n\n出力は以下の形式で整理すること。\n① 完成プロンプト\n② シーン構成\n③ 演出・カメラ指示\n④ カスタマイズ案\n⑤ 画像の使い方\n\n① 完成プロンプト\n${buildCompletePrompt()}\n\n② シーン構成\n${scene}\n\n③ 演出・カメラ指示\n${camera}\n\n④ カスタマイズ案\n${customize}\n\n⑤ 画像の使い方\n${imageUsage}`;
    }

    function buildCompletePrompt() {
      const textSequence = state.textBlocks.filter(b => b.text.trim()).map(b => `「${b.text.trim()}」`).join(' → ');
      const flowSummary = state.flowMode === 'custom' ? buildCustomFlowText() : (state.recommendedFlow || '構成に合わせて自然につなぐ');
      return `店内向けの${state.length || ''}動画。${state.size || ''}。${state.mood || ''}の空気感で、${state.appeal || ''}を分かりやすく伝える。背景は内容に合った暗めまたは整理された空間演出。${textSequence || '見出し'}を順番に表示し、${flowSummary}の流れで構成する。既存画像がある場合は不自然に変形せず、最後に自然に見せる。文字は読みやすさを保ち、必要に応じて発光、粒子、フェード、軽いズームで動画らしさを出す。`;
    }

    function generateScenes() {
      const texts = state.textBlocks.filter(b => b.text.trim());
      if (!texts.length) return '・文章未入力のため、導入 → 主訴求 → 締め の流れで整理する';
      const per = inferSceneTiming(texts.length);
      let lines = ['・導入: 用途と雰囲気に合った背景演出で開始'];
      texts.forEach((t, i) => {
        lines.push(`・シーン${i + 1}: ${per[i] || '短時間'}で「${t.text.trim()}」を表示${t.tags.length ? `（${t.tags.join(' / ')}）` : ''}`);
      });
      if (state.material && state.material.includes('静止画')) lines.push('・締め: 最後に静止画を自然に表示して内容を整理する');
      else lines.push('・締め: 最後に見出しまたはロゴで印象を残して終える');
      return lines.join('\n');
    }

    function generateCameraNotes() {
      const notes = [];
      if (state.mood === '映画予告風') notes.push('・カメラは基本固定、導入と締めでごく軽いズームを入れる');
      else notes.push('・カメラは内容が読みやすい範囲で、軽いズームやパンを使う');
      if (state.length === '5秒') notes.push('・5秒尺のため、動きは絞って見出しの読了を優先する');
      if (state.material === '静止画あり' || state.material === '安全寄り構成で作る') notes.push('・既存画像は不自然に変形させず、最後にそのまま表示または軽いズームのみに留める');
      notes.push('・光、粒子、発光、フェードを使う場合も、文章の視認性を優先する');
      return notes.join('\n');
    }

    function generateImageUsage() {
      if (state.material === '静止画あり' || state.material === '安全寄り構成で作る') {
        return '・静止画は最後にそのまま表示するか、ごく軽いズームインのみ加える\n・文字演出と分けて扱い、静止画そのものは不自然に加工しない\n・前段の背景演出や光粒で動画らしさを補完し、最後に情報を整理して見せる';
      }
      if (state.material === 'ロゴあり') {
        return '・ロゴは導入または締めに使用し、軽い発光やフェードで自然に見せる\n・極端な変形や過剰な装飾は避ける';
      }
      if (state.material === '商品画像あり') {
        return '・商品画像は被写体として扱い、軽いズームや背景ぼかしで奥行きを出す\n・質感を損なう過度な加工は避ける';
      }
      return '・素材がないため、文字、背景、光、粒子、カメラワークで動画らしさを構成する';
    }

    function generateCustomizeIdeas() {
      const ideas = [];
      if (state.length === '5秒') ideas.push('・情報量が多い場合は、8秒版も併記して比較すると破綻を避けやすい');
      if (state.mood === '映画予告風') ideas.push('・映画風を強めたい場合は「キラキラ」より「光粒」「閃光」「微細な粒子」と表現するとブレにくい');
      if (state.material === '静止画あり') ideas.push('・静止画を最後に見せる時間を長めに取ると内容が伝わりやすい');
      ideas.push('・読みやすさ優先版とインパクト重視版の2案を作ると比較しやすい');
      return ideas.map(v => `・${v}`).join('\n');
    }

    function generateReviewRequest(prompt) {
      return `この動画生成AI向けプロンプトを確認してください。以下の観点でチェックしてください。\n1. 指示の矛盾や不足はないか\n2. 映像として不自然な箇所はないか\n3. 秒数に対して情報量は適切か\n4. 曖昧で解釈が分かれそうな表現はないか\n5. 想定と違う動画になるリスクがある箇所はないか\n6. 修正した方がよい表現があれば具体的に示してください\n\n確認対象プロンプト:\n\n${prompt}`;
    }

    function inferCreditBand() {
      if (state.length === '5秒' || state.length === '8秒') return '低め';
      if (state.length === '10秒' || state.length === '15秒') return '中くらい';
      return 'やや高め';
    }

    function inferSceneTiming(textCount) {
      if (state.length === '5秒') {
        if (textCount <= 2) return ['0.8〜1.5秒', '1.5〜2.5秒'];
        return ['0.5〜1.1秒', '1.1〜2.0秒', '2.0〜3.2秒'];
      }
      if (state.length === '8秒') return ['1.0〜2.0秒', '2.0〜3.5秒', '3.5〜5.0秒'];
      return ['読みやすい尺', '読みやすい尺', '読みやすい尺'];
    }

    function buildCustomFlowText() {
      if (state.customLevel === 'full') return state.customFlowText || 'カスタム構成';
      if (state.customLevel === 'mid') {
        const middle = state.customMid.middle.length ? state.customMid.middle.join(' / ') : '途中要素未設定';
        return `最初に${state.customMid.start || '未設定'}、途中で${middle}、最後に${state.customMid.end || '未設定'}。特に${state.customMid.emphasis || '未設定'}を強く見せる構成`;
      }
      if (state.customLevel === 'light') {
        return `${state.customLight.focus || '未設定'}を目立たせ、${state.customLight.impression || '未設定'}寄りの印象で進み、最後は${state.customLight.ending || '未設定'}構成`;
      }
      return 'カスタム構成';
    }

    function canProceedFlow() {
      if (state.flowMode === 'recommended' || state.flowMode === 'auto') return !!state.recommendedFlow;
      if (state.flowMode === 'custom') {
        if (state.customLevel === 'full') return !!state.customFlowText.trim();
        if (state.customLevel === 'mid') return !!(state.customMid.start && state.customMid.middle.length && state.customMid.end && state.customMid.emphasis);
        if (state.customLevel === 'light') return !!(state.customLight.focus && state.customLight.impression && state.customLight.ending);
      }
      return false;
    }

    function canProceedTexts() {
      const blocks = state.textBlocks.slice(0, state.textCount);
      return blocks.every(b => b.text.trim());
    }

    function adjustTextBlocks() {
      while (state.textBlocks.length < state.textCount) state.textBlocks.push({ text: '', tags: [] });
      if (state.textBlocks.length > state.textCount) state.textBlocks = state.textBlocks.slice(0, state.textCount);
    }

    function optionTags(arr, selected) {
      return arr.map(v => `<option value="${v}" ${v === selected ? 'selected' : ''}>${v || '選択してください'}</option>`).join('');
    }

    function textPlaceholder(index) {
      if (index === 0) return '例：新装開店！';
      if (index === 1) return '例：3月23日（月）';
      if (index === 2) return '例：10:00 OPEN!（予定）';
      return '例：補足文を入力';
    }

    function textHint(index) {
      if (index === 0) return 'もっとも目立たせたい文章を入力してください。';
      if (index === 1) return '日付や開催日などを入力してください。';
      if (index === 2) return '時間や補足を入力してください。';
      return '必要であれば補足文を入力してください。';
    }

    function nextStep() {
      if (state.currentStep < stepMeta.length - 1) {
        state.currentStep += 1;
        renderStep();
      }
    }

    function prevStep() {
      if (state.currentStep > 0) {
        state.currentStep -= 1;
        renderStep();
      }
    }

    function goTop() {
      state.currentStep = 0;
      renderStep();
    }

    function setPurpose(value) { state.purpose = value; renderStep(); }
    function setAppeal(value) { state.appeal = value; renderStep(); }
    function setSize(value) { state.size = value; renderStep(); }
    function setLength(value) { state.length = value; renderStep(); }
    function setMood(value) { state.mood = value; renderStep(); }
    function setMaterial(value) { state.material = value; renderStep(); }

    function setFlowMode(value) {
      state.flowMode = value;
      if (value !== 'custom') state.customLevel = null;
      renderStep();
    }

    function setRecommendedFlow(value) {
      state.recommendedFlow = value;
      state.recommendedFlowReasons = getItem(data.flowRecommended, value)?.reasons || [];
      renderStep();
    }

    function setCustomLevel(value) { state.customLevel = value; renderStep(); }
    function setCustomFlowText(value) { state.customFlowText = value; }
    function setCustomMid(key, value) { state.customMid[key] = value; renderStep(); }
    function toggleCustomMidMiddle(value) {
      const arr = state.customMid.middle;
      if (arr.includes(value)) state.customMid.middle = arr.filter(v => v !== value);
      else state.customMid.middle = [...arr, value];
      renderStep();
    }
    function setCustomLight(key, value) { state.customLight[key] = value; renderStep(); }

    function setTextCount(value) {
      state.textCount = Number(value);
      adjustTextBlocks();
      renderStep();
    }

    function setTextBlock(index, value) {
      state.textBlocks[index].text = value;
    }

    function toggleTextTag(index, tag) {
      const tags = state.textBlocks[index].tags;
      if (tags.includes(tag)) state.textBlocks[index].tags = tags.filter(v => v !== tag);
      else state.textBlocks[index].tags = [...tags, tag];
      renderStep();
    }

    function autoRecommendFlow() {
      state.flowMode = 'auto';
      const reasons = [];
      let flow = '導入演出 → 見出し → 日付 → 締め';

      if ((state.material === '静止画あり' || state.material === '安全寄り構成で作る') && (state.length === '5秒' || state.length === '8秒')) {
        flow = '背景演出 → 文章訴求 → 最後に静止画';
        reasons.push('静止画ありのため、最後にPOPや画像を見せると内容を整理しやすい');
        reasons.push(`${state.length}でも無理なく収まりやすい構成です`);
      }

      if (state.appeal === 'ロゴ訴求' || state.material === 'ロゴあり') {
        flow = 'ロゴ → 告知 → 締め';
        reasons.push('ロゴ印象を活かしやすい内容です');
      }

      if ((state.length === '5秒') && (state.mood === 'インパクト重視' || state.mood === '映画予告風')) {
        flow = '文章を順番に強く見せて最後にまとめる';
        reasons.push('短尺で印象を残すには、文章を強く出す構成が向いています');
      }

      if (state.appeal === '新装開店' && !reasons.length) {
        reasons.push('新装開店は見出しと日時の流れが分かりやすい構成と相性が良い');
      }
      if (state.purpose === '店内モニター') reasons.push('店内モニター向けで、音なしでも伝わりやすい構成を優先しています');
      if (!reasons.length) reasons.push('選んだ用途・長さ・素材に合わせて無理のない構成を優先しています');

      state.recommendedFlow = flow;
      state.recommendedFlowReasons = [...new Set(reasons)];
      renderStep();
    }

    function acceptAutoFlow() {
      state.flowMode = 'auto';
      renderStep();
    }

    function copyText(id) {
      const text = document.getElementById(id).innerText;
      navigator.clipboard.writeText(text).then(() => {
        alert('コピーしました');
      });
    }

    function escapeHTML(str) {
      return String(str || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function escapeJS(str) {
      return String(str || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'");
    }

    renderStep();
  </script>
</body>
</html>
